services:
  - type: web
    name: freedom-wall
    runtime: python3
    buildCommand: pip install -r requirements.txt && cd kylaaaa && python manage.py collectstatic --noinput
    startCommand: cd kylaaaa && gunicorn kylaaaa.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: kylaaaa.settings
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: '*'